<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Shop our best selling products. Free shipping on qualifying orders." />
  <title>Best Sellers</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="bg-white text-gray-900 font-sans antialiased">
  <main class="page-width mx-auto px-4 py-8 md:py-12">
    <section aria-labelledby="best-sellers-heading">

    <!-- Section header -->
    <header class="flex flex-col items-center text-center sm:flex-row sm:items-center sm:justify-between sm:text-left gap-4 mb-8 md:mb-10">
      <h1 id="best-sellers-heading" class="font-serif text-3xl md:text-4xl font-bold text-gray-900 w-full sm:w-auto text-center sm:text-left tracking-tight">Best Sellers</h1>
      <a
        href="#"
        class="hidden sm:inline-flex text-sm font-normal text-gray-800 hover:text-gray-950 items-center gap-1.5 w-fit underline-offset-4 hover:underline"
        aria-label="Shop all best sellers"
      >
        Shop All Best Sellers
        <span aria-hidden="true" class="font-normal">&#8594;</span>
      </a>
    </header>

    <!-- Desktop: horizontal scroll (no native bar / no arrows — use track below). Mobile: 2 cols grid + Show More. -->
    <div>
      <div id="product-grid" class="grid grid-cols-2 gap-4 md:flex md:flex-nowrap md:overflow-x-auto md:gap-6 md:scroll-smooth md:min-w-0 best-sellers-slider">
      </div>
    </div>

    <!-- Show More button (mobile only) -->
    <div class="mt-6 flex justify-center md:hidden" id="show-more-container">
      <button
        type="button"
        id="show-more-btn"
        class="rounded-full bg-gray-900 text-white px-8 py-3 text-sm font-medium hover:bg-gray-800 transition-colors"
        aria-expanded="false"
        aria-controls="show-more-wrapper"
      >
        Show More
      </button>
    </div>

    <!-- Desktop: custom scroll track (click or drag thumb; mirrors product row scroll). Hidden on mobile. -->
    <div class="hidden md:block mt-10 pt-6">
      <div
        id="carousel-scroll-track"
        class="carousel-scroll-track relative bg-gray-200 rounded-full cursor-pointer select-none"
        role="scrollbar"
        aria-orientation="horizontal"
        aria-controls="product-grid"
        aria-valuemin="0"
        tabindex="0"
      >
        <div
          id="carousel-scroll-thumb"
          class="carousel-scroll-thumb absolute top-0 h-full bg-gray-900 rounded-full"
          aria-hidden="true"
        ></div>
      </div>
    </div>


    </section>
    </main>
      <script src="main.js"></script>
    </body>
</html>
